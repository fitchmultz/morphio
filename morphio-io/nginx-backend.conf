# ------------------------------------------------------------
# Configuration for api.morphio.io
# ------------------------------------------------------------

# Map HTTPS scheme to HSTS header
map $scheme $hsts_header {
    https   "max-age=63072000; preload";
}

# Correlation ID: prefer incoming header, else fallback to nginx $request_id
map $http_x_correlation_id $corr_id_map { default $http_x_correlation_id; }
map $request_id $fallback_corr { default $request_id; }
map $corr_id_map $corr_id { "" $fallback_corr; default $corr_id_map; }

# JSON log format for ELK/Vector
log_format json_elk '{"time":"$time_iso8601","remote_addr":"$remote_addr","request":"$request","status":$status,"bytes_sent":$bytes_sent,"request_time":$request_time,"upstream_time":"$upstream_response_time","method":"$request_method","host":"$host","uri":"$request_uri","referer":"$http_referer","ua":"$http_user_agent","x_forwarded_for":"$http_x_forwarded_for","correlation_id":"$corr_id"}';

# Update the map block to include development URLs
map $http_origin $cors_origin {
    default "";
    "https://morphio.io"        "$http_origin";
    "https://www.morphio.io"    "$http_origin";
    "http://localhost:3005"     "$http_origin";
    "http://localhost:3500"     "$http_origin";
    "http://localhost:8005"     "$http_origin";  # Add this for development
}

# Set correct SameSite attributes for cookies - Lax for regular cookies, None for cross-site
map $http_origin $cookie_samesite {
    default "Lax";
    "https://morphio.io"      "None";
    "https://www.morphio.io"  "None";
    "http://localhost:3005"   "None";
    "http://localhost:3500"   "None";
    "http://localhost:8005"   "None";
}

server {
  # Define variables for proxy pass
  set $forward_scheme http;
  set $server         "192.168.1.196";
  set $port           8005;

  # Listen on both IPv4 and IPv6 for HTTP and HTTPS
  listen 80;
  listen [::]:80;
  listen 443 ssl;
  listen [::]:443 ssl;

  # Add http2 directive
  http2 on;

  # Set server name
  server_name api.morphio.io;

  # Include Let's Encrypt SSL configuration
  include conf.d/include/letsencrypt-acme-challenge.conf;
  include conf.d/include/ssl-ciphers.conf;
  ssl_certificate /etc/letsencrypt/live/npm-4/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/npm-4/privkey.pem;

  # Include asset caching configuration
  include conf.d/include/assets.conf;

  # Include security configurations to block exploits
  include conf.d/include/block-exploits.conf;

  # Add HSTS header for HTTPS requests
  add_header Strict-Transport-Security $hsts_header always;

  # Force SSL/HTTPS
  include conf.d/include/force-ssl.conf;

  # Configure access and error logs
  access_log /data/logs/proxy-host-15_access.log json_elk;
  error_log /data/logs/proxy-host-15_error.log warn;

  # Increase global timeout settings
  proxy_connect_timeout 300s;
  proxy_send_timeout 300s;
  proxy_read_timeout 300s;
  send_timeout 300s;

  # Add these security headers globally
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'self'; connect-src 'self'" always;

  location / {
    # Remove any existing CORS headers from the backend response
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Max-Age;
    proxy_hide_header Access-Control-Expose-Headers;

    # Handle OPTIONS preflight
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,Pragma,X-Mx-ReqToken,Keep-Alive,X-Requested-With,If-Modified-Since,X-CSRF-Token,Cookie,Set-Cookie' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Max-Age' 1728000 always;
        add_header 'Content-Type' 'text/plain charset=UTF-8' always;
        add_header 'Content-Length' 0 always;
        return 204;
    }

    # For actual requests, add CORS headers
    add_header 'Access-Control-Allow-Origin' $cors_origin always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
    add_header 'Access-Control-Expose-Headers' 'Set-Cookie,Content-Type,Content-Length,Authorization' always;

    # Proxy configuration
    proxy_pass $forward_scheme://$server:$port;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-CSRF-Token $http_x_csrf_token;
    proxy_set_header X-Correlation-ID $corr_id;
    proxy_set_header Origin $http_origin;
    proxy_set_header Referer $http_referer;
    proxy_pass_request_headers on;

    # Let cookies pass through without modification
    # Do not modify SameSite attributes as they're set by the backend
    proxy_cookie_flags ~ secure httponly;
    proxy_cookie_path / "/";

    proxy_cache_bypass $http_upgrade;

    # Additional timeout settings for this specific location
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # Add this security measure
    proxy_hide_header X-Powered-By;

    # Propagate correlation id to client and enable debug headers
    add_header X-Correlation-ID $corr_id always;
    # Debug logging for cookies and headers
    add_header X-Debug-CORS-Origin $cors_origin always;
    add_header X-Debug-Host $host always;
    add_header X-Debug-Request-Origin $http_origin always;
  }

  # Include custom server configurations
  include /data/nginx/custom/server_proxy[.]conf;
}
