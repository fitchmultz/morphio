# Alembic configuration for async SQLAlchemy

[alembic]
script_location = db
prepend_sys_path = .
version_path_separator = os

# Async SQLAlchemy URL (adjust as needed)
# sqlalchemy.url =

# File template for migration names (uncomment to use)
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Timezone settings (uncomment and set if needed)
# timezone = UTC

# Max length for migration "slug"
truncate_slug_length = 40

# Run environment during 'revision' command
revision_environment = true

# Allow .pyc and .pyo files for revisions
sourceless = false

# Output encoding for revision files
output_encoding = utf-8

[post_write_hooks]
# Formatting hooks disabled (project uses Ruff, no Black)
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100 REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = WARN
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
