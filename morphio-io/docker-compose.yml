services:
  backend:
    build:
      context: ..  # Repo root for morphio-native access
      dockerfile: morphio-io/backend/Dockerfile.api
    container_name: morphio-io-backend
    ports:
      - '8005:8005'
    env_file:
      - path: .env
        required: false
    environment:
      - APP_ENV=${APP_ENV:-development}
      - APP_PORT=${APP_PORT:-8005}
      - REDIS_URL=redis://redis:6384/0
      - WORKER_ML_URL=http://worker-ml:8001
      - CRAWLER_URL=http://crawler:8002
    depends_on:
      redis:
        condition: service_healthy
      worker-ml:
        condition: service_healthy
      crawler:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - sqlite_data:/app/db
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8005/health/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    image: ghcr.io/fitchmultz/morphio-io-frontend:latest
    container_name: morphio-io-frontend
    ports:
      - '3500:3005'
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8005}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3005"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:alpine
    container_name: morphio-io-redis
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - '6384:6384'
    volumes:
      - ${REDIS_CONF_PATH:-./redis.conf}:/usr/local/etc/redis/redis.conf
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6384", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker-ml:
    build:
      context: ..
      dockerfile: morphio-io/backend/Dockerfile.worker-ml
    platform: linux/amd64  # Required: torchcodec lacks Linux ARM64 wheels
    container_name: morphio-io-worker-ml
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health/"]
      interval: 30s
      timeout: 5s
      retries: 5

  crawler:
    build:
      context: ..
      dockerfile: morphio-io/backend/Dockerfile.crawler
    container_name: morphio-io-crawler
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8002/health/"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  sqlite_data:
  redisdata:
