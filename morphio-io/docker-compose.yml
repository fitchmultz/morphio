services:
  backend:
    build:
      context: ../..  # Repo root for morphio-native access
      dockerfile: morphio-io/backend/Dockerfile.api
    container_name: morphio-io-backend
    ports:
      - '8000:8000'
    env_file:
      - stack.env
    environment:
      - APP_ENV=${APP_ENV}
      - APP_PORT=${APP_PORT}
      - REDIS_URL=redis://redis:6379/0
      - WORKER_ML_URL=http://worker-ml:8001
      - CRAWLER_URL=http://crawler:8002
    depends_on:
      redis:
        condition: service_healthy
      worker-ml:
        condition: service_healthy
      crawler:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - sqlite_data:/app/db
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    image: ghcr.io/fitchmultz/morphio-io-frontend:latest
    container_name: morphio-io-frontend
    ports:
      - '3500:3000'
    env_file:
      - stack.env
    environment:
      - NODE_ENV=${NODE_ENV}
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:alpine
    container_name: morphio-io-redis
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - '6379:6379'
    volumes:
      - ${REDIS_CONF_PATH}:/usr/local/etc/redis/redis.conf
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker-ml:
    build:
      context: .
      dockerfile: backend/Dockerfile.worker-ml
    container_name: morphio-io-worker-ml
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health/"]
      interval: 30s
      timeout: 5s
      retries: 5

  crawler:
    build:
      context: .
      dockerfile: backend/Dockerfile.crawler
    container_name: morphio-io-crawler
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8002/health/"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  sqlite_data:
  redisdata:
