name: Docker Build and Publish Frontend to GHCR

on:
  push:
    branches: [main, dev, dev2]
    paths:
      - 'frontend/**'
      - '.github/workflows/docker-publish-frontend.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4.2.2

      - name: Log in to Docker Hub
        uses: docker/login-action@v3.3.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Cache Docker layers
        uses: actions/cache@v4.2.2
        with:
          path: |
            ~/.pnpm-store
            ~/.cache/pnpm
            /tmp/.buildx-cache
          key: ${{ runner.os }}-pnpm-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-pnpm-buildx-

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository_owner }}/morphio-io-frontend:${{ github.ref == 'refs/heads/main' && 'latest' || github.ref_name }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://api.morphio.io
            NODE_ENV=production
          cache-from: |
            type=local,src=/tmp/.buildx-cache
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/morphio-io-frontend:cache
          cache-to: |
            type=local,dest=/tmp/.buildx-cache-new,mode=max
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/morphio-io-frontend:cache,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Trigger Portainer Stack Update
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            curl -X POST ${{ secrets.PORTAINER_WEBHOOK_URL }}
          elif [ "${{ github.ref_name }}" = "dev" ]; then
            curl -X POST ${{ secrets.PORTAINER_WEBHOOK_URL_DEV }}
          elif [ "${{ github.ref_name }}" = "dev2" ]; then
            curl -X POST ${{ secrets.PORTAINER_WEBHOOK_URL_DEV2 }}
          fi
