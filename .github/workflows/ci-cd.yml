name: CI • Fast PR Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-fast-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-checks:
    name: Fast Gate • backend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          uv-version: "0.10.8"
          enable-cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.1"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: morphio-native

      - name: Prepare env file for audits
        run: make env

      - name: Backend checks
        run: bash scripts/ci/jobs/backend-checks.sh

  frontend-checks:
    name: Fast Gate • frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "morphio-io/frontend/pnpm-lock.yaml"

      - name: Frontend checks
        run: bash scripts/ci/jobs/frontend-checks.sh

  guardrails:
    name: Fast Gate • guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare env file for audits
        run: make env

      - name: Guardrails
        run: bash scripts/ci/jobs/guardrails.sh
