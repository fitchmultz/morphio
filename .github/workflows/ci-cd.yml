name: CI / CD – Backend + Frontend + Images

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  native-build:
    name: Native • Rust Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust 1.75
        uses: dtolnay/rust-action@stable
        with:
          toolchain: "1.75"
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: morphio-native

      - name: Rust format check
        working-directory: morphio-native
        run: cargo fmt --check

      - name: Rust clippy
        working-directory: morphio-native
        run: cargo clippy -- -D warnings

      - name: Rust tests
        working-directory: morphio-native
        run: cargo test

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build wheel for CI
        run: |
          pip install maturin
          cd morphio-native && maturin build --release

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: morphio-native-wheel
          path: morphio-native/target/wheels/*.whl

  backend-checks:
    name: Backend • Ruff + ty + Lock drift
    needs: [native-build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust 1.75
        uses: dtolnay/rust-action@stable
        with:
          toolchain: "1.75"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: morphio-native

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh -s -- -y
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Sync (frozen) with dev deps
        run: |
          uv venv .venv
          UV_PROJECT_ENVIRONMENT=.venv uv sync --project morphio-io/backend --dev --frozen

      - name: Ruff (lint)
        run: UV_PROJECT_ENVIRONMENT=.venv uv run --project morphio-io/backend ruff check morphio-io/backend

      - name: Ruff (format check)
        run: UV_PROJECT_ENVIRONMENT=.venv uv run --project morphio-io/backend ruff format --check morphio-io/backend

      - name: ty (type check)
        working-directory: morphio-io/backend
        run: UV_PROJECT_ENVIRONMENT=../../.venv uv run ty check

  frontend-checks:
    name: Frontend • Biome + TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: morphio-io/frontend/pnpm-lock.yaml

      - name: Enable Corepack and pin pnpm
        working-directory: morphio-io/frontend
        run: |
          corepack enable
          corepack prepare pnpm@10.11.0 --activate

      - name: Install dependencies
        working-directory: morphio-io/frontend
        run: pnpm install --frozen-lockfile

      - name: Biome (lint + format check)
        working-directory: morphio-io/frontend
        run: pnpm biome ci .

      - name: TypeScript
        working-directory: morphio-io/frontend
        run: pnpm type-check

  docker-build-push:
    name: Docker • Build and (conditionally) Push
    needs: [ backend-checks, frontend-checks ]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: morphio-io/backend/Dockerfile.api
            image: ghcr.io/${{ github.repository_owner }}/morphio-io-backend-api
            context: .  # Repo root for morphio-native access
            platforms: linux/amd64
          - name: worker-ml
            dockerfile: morphio-io/backend/Dockerfile.worker-ml
            image: ghcr.io/${{ github.repository_owner }}/morphio-io-worker-ml
            context: .  # Repo root for morphio-native access
            platforms: linux/amd64  # torchcodec lacks Linux ARM64 wheels
          - name: crawler
            dockerfile: morphio-io/backend/Dockerfile.crawler
            image: ghcr.io/${{ github.repository_owner }}/morphio-io-crawler
            context: .  # Repo root for morphio-native access
            platforms: linux/amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
