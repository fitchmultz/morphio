name: Docker • Full Stack Smoke

on:
  workflow_dispatch:

concurrency:
  group: docker-full-smoke-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full-smoke:
    name: Full stack smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Full stack smoke
        run: bash scripts/ci/jobs/docker-full-smoke.sh
